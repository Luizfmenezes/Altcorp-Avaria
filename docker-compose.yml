services:
  postgres:
    image: postgres:16-alpine
    container_name: avarias_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avarias}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio em .env}
      POSTGRES_DB: ${POSTGRES_DB:-avarias}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avarias}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: avarias_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER obrigatorio em .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD obrigatorio em .env}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: avarias_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET:-avarias-photos} || true;
      mc anonymous set download local/${MINIO_BUCKET:-avarias-photos} || true;
      exit 0;
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avarias_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-avarias}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-avarias}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatorio em .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 720
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-avarias-photos}
      MINIO_SECURE: "false"
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://${HOST_IP:-localhost}:9000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://${HOST_IP:-localhost}:5173,http://${HOST_IP:-localhost}:5174,http://${HOST_IP:-localhost}:8080}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@altcorp.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      OLHOVIVO_TOKEN: ${OLHOVIVO_TOKEN:-}
      OLHOVIVO_BASE_URL: ${OLHOVIVO_BASE_URL:-http://api.olhovivo.sptrans.com.br/v2.1}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL-}
    container_name: avarias_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL-}
    container_name: avarias_mobile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  postgres_data:
  minio_data:
